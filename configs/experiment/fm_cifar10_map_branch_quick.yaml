base: configs/experiment/fm_cifar10_map_branch.yaml

experiment:
  name: fm_cifar10_map_branch_quick

teacher:
  num_inference_steps: 32

target:
  start_scales: 18
  teacher_sampler_sub_batch: 128
  num_heun_step: 8
  heun_step_strategy: uniform

loss:
  endpoint_weight: 0.15
  endpoint_every: 16
  endpoint_batch_size: 16
  endpoint_steps: [8]
  endpoint_step_weights: [1.0]

train:
  epochs: 30
