experiment:
  name: fm_experiment
  seed: 42

runtime:
  device: auto
  amp: true
  ddp: false

train:
  objective: flow_matching_velocity
  epochs: 100
  batch_size: 64
  num_workers: 4
  pin_memory: true
  val_fraction: 0.05
  lr: 1.0e-4
  weight_decay: 0.0
  ema_decay: 0.9999
  optimizer_betas: [0.9, 0.95]
  skewed_timesteps: true

logging:
  backend: jsonl
  log_every: 50

checkpoint:
  save_every_epochs: 10
  monitor: fid
  monitor_mode: min
