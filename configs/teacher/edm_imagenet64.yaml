teacher:
  type: pretrained
  backend: external_reference
  checkpoint: ${IMAGENET64_TEACHER_CKPT:-checkpoints/teachers/edm_imagenet64_ema.pt}
  image_size: 64
  class_cond: true
  num_classes: 1000
  attention_resolutions: [32, 16, 8]
  num_channels: 192
  num_head_channels: 64
  num_res_blocks: 3
  resblock_updown: true
  use_scale_shift_norm: true
  dropout: 0.0
  teacher_dropout: 0.1
  use_fp16: true
